}
.chat-contact-item:hover .chat-contact-actions { display: flex; }
.chat-contact-item.active .chat-contact-actions { display: flex; }
.chat-action-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}
.chat-action-btn:hover { color: #ccc; background: #2a2a2a; }
.chat-action-btn.fav-on { color: #f59e0b; }
.chat-contact-fav-icon { font-size: 0.8rem; margin-right: 2px; color: #f59e0b; }
.chat-online-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; margin-right: 5px; flex-shrink: 0; vertical-align: middle; }

/* ===== VOICE CHAT ===== */
.vc-call-btn {
  background: none;
  border: 1px solid #2a2a2a;
  color: #4ade80;
  border-radius: 8px;
  padding: 4px 11px;
  font-size: 0.8rem;
  cursor: pointer;
  margin-left: auto;
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.vc-call-btn:hover { background: #0d2a1a; border-color: #4ade80; }

/* Active call bar — right-side panel, mirrors left sidebar behaviour */
#vc-active {
  position: fixed;
  top: 50%;
  right: 10px;
  transform: translateY(-50%) translateX(0);
  z-index: 200001;
  display: none;
  flex-direction: column;
  background: #171717;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  padding: 14px 16px;
  gap: 10px;
  align-items: stretch;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  min-width: 210px;
  max-width: 250px;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
}
#vc-active.show { display: flex; }
#vc-active.vc-collapsed {
  transform: translateY(-50%) translateX(calc(100% + 14px));
  opacity: 0;
  pointer-events: none;
}
/* Toggle button on right edge — mirrors nav-toggle-btn */
#vc-toggle-btn {
  position: fixed;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  z-index: 200002;
  width: 26px; height: 54px;
  display: none;
  align-items: center;
  justify-content: center;
  background: #1a2a2a;
  border-radius: 8px 0 0 8px;
  color: #4ade80;
  font-size: 0.95rem;
  pointer-events: auto;
  cursor: pointer;
  border: 1px solid #2a4a4a;
  border-right: none;
  transition: background 0.2s;
}
.vc-join-banner {
  background: #0a1f12;
  border: 1px solid #166534;
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.vc-join-banner-text { color: #4ade80; font-size: 0.88rem; flex: 1; }
.vc-join-btn {
  background: #16a34a; border: none; color: #fff;
  padding: 5px 14px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
  transition: background 0.15s;
}
.vc-join-btn:hover { background: #15803d; }
.vc-decline-btn {
  background: none; border: 1px solid #374151; color: #6b7280;
  padding: 5px 10px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.vc-decline-btn:hover { border-color: #6b7280; color: #9ca3af; }

/* ===== CHAT MEDIA EMBEDS ===== */
.chat-media-img {
  max-width: 400px; max-height: 440px; border-radius: 8px;
  display: block; cursor: pointer; object-fit: contain;
}
.chat-custom-emoji {
  width: 22px; height: 22px; object-fit: contain;
  vertical-align: middle; border-radius: 3px;
  display: inline-block;
}
.chat-media-video {
  max-width: 400px; border-radius: 8px; display: block;
}
.chat-media-yt { width: 400px; }
.chat-media-yt iframe { width: 100%; height: 225px; border-radius: 8px; border: none; display: block; }
.chat-bubble a { color: #7dd3fc; word-break: break-all; }
.chat-bubble-jumbo { font-size: 4rem; line-height: 1.15; padding: 2px 0; }
.chat-bubble-jumbo .chat-custom-emoji { width: 64px; height: 64px; }

/* ===== GIF PANEL ===== */
#chat-gif-panel {
  background: var(--bg-alt); max-height: 400px; width: 360px; align-self: flex-end;
  border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0;
  display: flex; flex-direction: column;
}
.chat-gif-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chat-gif-tab {
  flex: 1; padding: 7px; background: none; border: none; color: var(--text-muted);
  font-size: 0.82rem; cursor: pointer; transition: color 0.15s;
}
.chat-gif-tab:hover { color: var(--text); }
.chat-gif-tab.active { color: var(--text); border-bottom: 2px solid #3b82f6; }
.chat-gif-grid {
  overflow-y: auto; display: flex; flex-wrap: wrap; gap: 4px;
  padding: 6px; flex: 1; align-content: flex-start;
}
.chat-gif-item {
  position: relative; cursor: pointer; border-radius: 5px; overflow: hidden; flex-shrink: 0;
}
.chat-gif-item img { width: 100px; height: 75px; object-fit: cover; display: block; }
.chat-gif-item:hover img { opacity: 0.85; }
.chat-gif-fav-btn {
  position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.55);
  border: none; color: #888; font-size: 0.75rem; cursor: pointer; border-radius: 3px;
  padding: 1px 3px; line-height: 1;
}
.chat-gif-fav-btn.faved { color: #f59e0b; }
.chat-gif-empty { color: var(--text-muted); font-size: 0.82rem; padding: 16px; text-align: center; width: 100%; }

/* ===== CHAT INPUT BUTTONS ===== */
.chat-attach-btn, .chat-gif-btn {
  background: none; border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px;
  padding: 0 9px; height: 36px; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; white-space: nowrap;
}
.chat-attach-btn:hover, .chat-gif-btn:hover { background: var(--accent); color: var(--text); }
.chat-gif-btn.active { color: #3b82f6; border-color: #3b82f6; }
.chat-emoji-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 36px; height: 36px; cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.chat-emoji-btn:hover { background: var(--accent); border-color: var(--text-muted); transform: scale(1.1); }
.chat-emoji-btn.active { border-color: #3b82f6; background: var(--active-tint); }
/* Emoji picker panel */
#chat-emoji-panel {
  background: var(--bg-alt); flex-direction: column; height: 380px;
  width: 360px; align-self: flex-end; border: 1px solid var(--border);
  border-bottom: none; border-radius: 8px 8px 0 0;
}
/* Attachment preview */
#chat-attach-preview {
  padding: 8px 12px 0; display: none; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
}
.chat-attach-thumb {
  position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); background: var(--accent); flex-shrink: 0;
}
.chat-attach-thumb img, .chat-attach-thumb video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.chat-attach-thumb-name {
  display: flex; align-items: center; justify-content: center; height: 100%;
  font-size: 0.65rem; color: var(--text-muted); text-align: center; padding: 6px; word-break: break-all;
}
.chat-attach-remove {
  position: absolute; top: 3px; right: 3px; width: 18px; height: 18px;
  background: rgba(0,0,0,0.75); border: none; color: #fff; border-radius: 50%;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1; padding: 0;
}
.ep-search-row {
  padding: 8px 10px 6px; flex-shrink: 0;
}
.ep-search {
  width: 100%; background: var(--accent); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 10px; color: var(--text); font-size: 0.82rem; outline: none; box-sizing: border-box;
}
.ep-search:focus { border-color: #3b82f6; }
.ep-cats {
  display: flex; gap: 2px; padding: 0 6px 6px; flex-shrink: 0;
  border-bottom: 1px solid var(--border); overflow-x: auto;
}
.ep-cats::-webkit-scrollbar { height: 0; }
.ep-cat-btn {
  background: none; border: none; border-radius: 6px; padding: 4px 6px;
  font-size: 1.05rem; cursor: pointer; opacity: 0.5; transition: opacity 0.12s, background 0.12s;
  flex-shrink: 0;
}
.ep-cat-btn:hover { opacity: 0.9; background: var(--accent); }
.ep-cat-btn.active { opacity: 1; background: var(--active-tint); }
.ep-cat-label {
  padding: 6px 10px 3px; font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em; flex-shrink: 0; width: 100%;
}
.ep-empty {
  color: var(--text-muted); font-size: 0.82rem; padding: 16px; text-align: center; width: 100%;
}
.ep-grid {
  flex: 1; overflow-y: auto; padding: 2px 6px 8px;
  display: flex; flex-wrap: wrap; align-content: flex-start; gap: 1px;
}
.ep-grid::-webkit-scrollbar { width: 4px; }
.ep-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ep-emoji {
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; cursor: pointer; border-radius: 6px; border: none; background: none;
  transition: background 0.08s, transform 0.08s; position: relative;
}
.ep-emoji:hover { background: var(--accent); transform: scale(1.2); }
.ep-tooltip {
  position: fixed; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 8px; font-size: 0.72rem; color: var(--text); pointer-events: none;
  z-index: 99999; white-space: nowrap; display: none;
}

/* Inline GIF fav star (in message bubbles) */
.chat-bubble-gif-wrap { position: relative; display: inline-block; }
.chat-bubble-gif-fav {
  position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.55);
  border: none; color: #888; font-size: 0.8rem; cursor: pointer; border-radius: 3px; padding: 2px 4px;
}
.chat-bubble-gif-fav.faved { color: #f59e0b; }

/* Group chat CSS */
.chat-group-icon { font-size: 0.8rem; margin-right: 3px; color: #818cf8; }
.chat-contact-item.group-item .chat-contact-name { color: #c7d2fe; }
.chat-contact-item.group-item.active { background: #1e1a3a; }
.chat-contact-item.group-item:hover { background: #1a1a2e; }

/* Group modal overlay */
#group-modal-overlay {
  position: fixed; inset: 0; z-index: 200010;
  background: rgba(0,0,0,0.75);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#group-modal-overlay.show { display: flex; }
.group-modal {
  background: #171717; border: 1px solid #2a2a2a; border-radius: 14px;
  padding: 24px; width: 340px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: vc-pop 0.2s ease;
}
.group-modal h3 { font-size: 1rem; font-weight: 600; color: #e8e8e8; margin-bottom: 16px; }
.group-modal input {
  width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8;
  padding: 8px 12px; border-radius: 8px; font-size: 0.88rem; outline: none;
  margin-bottom: 10px; box-sizing: border-box;
}
.group-modal input:focus { border-color: #3b82f6; }
.group-modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
.group-modal-btn {
  background: #3b82f6; border: none; color: #fff;
  padding: 7px 18px; border-radius: 8px; cursor: pointer; font-size: 0.88rem;
  transition: background 0.15s;
}
.group-modal-btn:hover { background: #2563eb; }
.group-modal-btn.cancel { background: #1f1f1f; border: 1px solid #333; color: #aaa; }
.group-modal-btn.cancel:hover { background: #2a2a2a; }
.group-members-list { margin: 8px 0 12px; max-height: 120px; overflow-y: auto; }
.group-member-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; border-radius: 6px; color: #ccc; font-size: 0.85rem;
}
.group-member-row:hover { background: #1f1f1f; }
.group-member-remove {
  background: none; border: none; color: #555; cursor: pointer; font-size: 0.9rem;
  transition: color 0.15s;
}
.group-member-remove:hover { color: #f87171; }
.group-modal-error { color: #f87171; font-size: 0.8rem; margin-top: 4px; min-height: 18px; }

@keyframes vc-pop {
  from { opacity: 0; transform: scale(0.93); }
  to   { opacity: 1; transform: scale(1); }
}

.vc-active-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
  animation: vc-pulse 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes vc-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.vc-active-info { flex: 1; min-width: 0; }
.vc-active-name { font-size: 0.9rem; font-weight: 600; color: #e8e8e8; }
.vc-active-timer { font-size: 0.75rem; color: #555; font-family: monospace; }
.chat-system-msg {
  text-align: center; color: #4b5563; font-size: 0.75rem; font-style: italic;
  padding: 4px 12px; margin: 6px 0;
}
.vc-active-participants { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.vc-participant-pill {
  font-size: 0.7rem; padding: 1px 7px; border-radius: 20px;
  background: #1f1f1f; border: 1px solid #333; color: #9ca3af;
}
.vc-participant-pill.connected { border-color: #166534; color: #4ade80; }
.vc-participant-pill.me { border-color: #1e3a5f; color: #60a5fa; }
.vc-active-btns { display: flex; gap: 6px; justify-content: center; }
.vc-mute-btn {
  background: #1f1f1f; border: 1px solid #333; color: #aaa;
  border-radius: 50%; width: 36px; height: 36px;
  font-size: 0.9rem; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.vc-mute-btn.muted { background: #3b1a1a; border-color: #7f1d1d; color: #f87171; }
.vc-mute-btn:hover { border-color: #555; }
.vc-end-btn {
  background: #dc2626; border: none; color: #fff;
  border-radius: 50%; width: 36px; height: 36px;
  font-size: 0.85rem; cursor: pointer;
  transition: background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.vc-end-btn:hover { background: #b91c1c; }
.vc-screen-btn {
  background: #1f1f1f; border: 1px solid #333; color: #aaa;
  border-radius: 50%; width: 36px; height: 36px;
  font-size: 0.85rem; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.vc-screen-btn:hover { border-color: #555; }
.vc-screen-btn.sharing { background: #1a3320; border-color: #166534; color: #4ade80; }

.vc-camera-btn {
  background: #1f1f1f; border: 1px solid #333; color: #aaa;
  border-radius: 50%; width: 36px; height: 36px;
  font-size: 0.85rem; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.vc-camera-btn:hover { border-color: #555; }
.vc-camera-btn.sharing { background: #1a2a3a; border-color: #1d4ed8; color: #60a5fa; }

#camera-tiles-area {
  display: none;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 10px;
  background: #0a0a0a;
  border-bottom: 1px solid #1f1f1f;
  flex-shrink: 0;
}
.camera-tile {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
  border: 1px solid #2a2a2a;
  flex-shrink: 0;
}
.camera-tile video { width: 160px; height: 120px; object-fit: cover; display: block; }
.camera-pip-btn {
  position: absolute; top: 4px; right: 4px; z-index: 2;
  background: rgba(0,0,0,0.55); border: none; color: #ccc;
  border-radius: 4px; width: 22px; height: 22px; font-size: 0.8rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.camera-tile:hover .camera-pip-btn { opacity: 1; }
.camera-pip-btn:hover { background: rgba(0,0,0,0.85); color: #fff; }
.camera-tile-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.65); color: #e5e7eb;
  font-size: 0.7rem; text-align: center; padding: 2px 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#screen-share-area {
  display: none;
  flex-direction: column;
  background: #0a0a0a;
  border-bottom: 1px solid #1f1f1f;
  position: relative;
  flex-shrink: 0;
}
#screen-share-area video {
  width: 100%; max-height: 320px; object-fit: contain; display: block; background: #000;
}
#screen-share-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 10px; background: #111;
}
#screen-share-label { font-size: 0.75rem; color: #6b7280; }
.ss-popout-btn {
  font-size: 0.72rem; padding: 3px 9px; border-radius: 5px;
  background: #1f1f1f; border: 1px solid #333; color: #9ca3af; cursor: pointer;
}
.ss-popout-btn:hover { background: #2a2a2a; color: #e5e7eb; }
.ss-pick-btn {
  background: #1f2937; border: 1px solid #374151; color: #e5e7eb;
  border-radius: 6px; padding: 5px 14px; font-size: 0.8rem; cursor: pointer;
}
.ss-pick-btn:hover { background: #2d3748; border-color: #4b5563; }
.ss-switch-btn {
  font-size: 0.72rem; padding: 3px 9px; border-radius: 5px;
  background: #1f1f1f; border: 1px solid #333; color: #9ca3af; cursor: pointer;
}
.ss-switch-btn:hover { background: #2a2a2a; color: #e5e7eb; }

/* ===== CHAT TOAST ===== */
#chat-toast-stack {
  position: fixed;
  bottom: 18px;
  right: 18px;
  z-index: 200000;
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
  pointer-events: none;
}
.chat-toast {
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-left: 3px solid #3b82f6;
  border-radius: 10px;
  padding: 11px 14px;
  color: #e8e8e8;
  font-size: 0.88rem;
  min-width: 240px;
  max-width: 310px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  pointer-events: all;
  cursor: pointer;
  animation: chat-toast-in 0.2s ease;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.chat-toast.hiding { opacity: 0; transform: translateX(20px); }
.chat-toast-title { font-weight: 600; color: #fff; margin-bottom: 2px; }
.chat-toast-sub { color: #ccc; font-size: 0.82rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-toast-reply { display: flex; gap: 5px; margin-top: 4px; }
.chat-toast-reply input { flex: 1; background: #111; border: 1px solid #3e3e3e; border-radius: 6px; color: #e8e8e8; font-size: 0.82rem; padding: 5px 8px; outline: none; min-width: 0; }
.chat-toast-reply input:focus { border-color: #3b82f6; }
.chat-toast-reply button { background: #3b82f6; border: none; border-radius: 6px; color: #fff; font-size: 0.8rem; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
.chat-toast-reply button:hover { background: #2563eb; }
@keyframes chat-toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.chat-contact-name {
  font-size: 0.9rem;
  color: #e8e8e8;
  font-weight: 500;
}
.chat-unread-badge {
  margin-left: auto;
  background: #3b82f6;
  color: #fff;
  border-radius: 10px;
  font-size: 0.7rem;
  padding: 1px 6px;
  font-weight: 600;
  min-width: 18px;
  text-align: center;
}
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #161616;
}
.chat-conv-header {
  padding: 14px 18px;
  border-bottom: 1px solid #1e1e1e;
  font-size: 0.95rem;
  font-weight: 600;
  color: #e8e8e8;
  min-height: 49px;
  display: flex;
  align-items: center;
}
.chat-messages-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-messages-empty {
  color: var(--text-muted);
  font-size: 0.88rem;
  text-align: center;
  margin: auto;
}
.chat-message {
  display: flex;
  max-width: 85%;
}
.chat-msg-me { align-self: flex-start; }
.chat-msg-them { align-self: flex-start; }

/* Isolate xterm.js from global * { font-family: system-ui } and other resets
   that break character measurement and cause overlap / double-spacing */
#term-body .xterm,
#term-body .xterm * {
  font-family: monospace !important;
  line-height: normal !important;
}
.chat-bubble {
  padding: 2px 4px;
  font-size: 1.05rem;
  line-height: 1.5;

<script>
/* ===== mobile.js ===== */
function isDeviceMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}
function getMobileMode() {
  var override = localStorage.getItem("forceMobile");
  if (override !== null) return override === "true";
  return isDeviceMobile();
}
function setMobileOverride(v) {
  if (v === null) {
    localStorage.removeItem("forceMobile");
  } else {
    localStorage.setItem("forceMobile", v ? "true" : "false");
  }
}
function getDeviceType() {
  return isDeviceMobile() ? "mobile" : "desktop";
}
function updateMobileUI() {
  var toggle = document.getElementById("mobileToggle");
  var deviceInfo = document.getElementById("deviceInfo");
  if (!toggle) return;
  var override = localStorage.getItem("forceMobile");
  var detectedDevice = getDeviceType();
  var currentMode = getMobileMode() ? "mobile" : "desktop";
  toggle.checked = override === "true";
  if (deviceInfo) {
    if (override === null) {
      deviceInfo.textContent = "device: " + detectedDevice;
    } else {
      if (override === "true" && detectedDevice === "mobile") {
        deviceInfo.textContent = "device: mobile";
      } else if (override === "false" && detectedDevice === "desktop") {
        deviceInfo.textContent = "device: desktop";
      } else {
        deviceInfo.textContent = "device: " + currentMode + " (forced)";
      }
    }
  }
}
function transformGameUrl(originalUrl) {
  if (!getMobileMode()) { return originalUrl; }
  var skipPatterns = ['/mobile.html', '/gamefile/nowgg/', '/extra/', 'http://', 'https://'];
  for (var i = 0; i < skipPatterns.length; i++) {
    if (originalUrl.includes(skipPatterns[i])) { return originalUrl; }
  }
  return '/mobile.html?url=' + encodeURIComponent(originalUrl);
}
function transformGameData(games) {
  if (!getMobileMode()) return games;
  return games.map(function(game) {
    return Object.assign({}, game, { url: transformGameUrl(game.url) });
  });
}
function getGameUrl(gameUrl) { return transformGameUrl(gameUrl); }
function autoTransformGameLinks() {
  if (!getMobileMode()) return;
  var gameLinks = document.querySelectorAll('[data-game-url]');
  gameLinks.forEach(function(link) {
    link.href = transformGameUrl(link.getAttribute('data-game-url'));
  });
  var gameIframes = document.querySelectorAll('iframe[data-game-url]');
  gameIframes.forEach(function(iframe) {
    iframe.src = transformGameUrl(iframe.getAttribute('data-game-url'));
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', autoTransformGameLinks);
} else {
  autoTransformGameLinks();
}
var mobileInitInterval = setInterval(function() {
  var toggle = document.getElementById("mobileToggle");
  if (toggle) {
    toggle.addEventListener("change", function() {
      setMobileOverride(toggle.checked);
      updateMobileUI();
      setTimeout(function() { location.reload(); }, 500);
    });
    updateMobileUI();
    clearInterval(mobileInitInterval);
  }
}, 100);
</script>

<script>
/* ===== GameLoader class ===== */
class GameLoader {
  constructor() {
    this.games = [];
    this.totalGames = 0;
    this.sourceFilter = 'all';
    this.truffledDown = false;
    this.popularGames = [
      "Five Nights At Epsteins",
      "Cuphead, Webport",
      "Hollow Knight, Webport",
      "Retro Bowl College",
      "Balatro, Webport"
    ];
    this.directOpenUrls = [
      '/games/amaze/index.html',
      '/extra/cc3ddevice.html'
    ];
  }
  async init() {
    try {
      await this.directSetIp();
      const [,tools] = await Promise.all([
        this.loadGames(),
        this._loadGitHubTools(),
      ]);
      this.renderGames();
      this.renderTools(tools);
      this.setupSearch();
      this.updateGameCount();
      this.checkTruffledStatus(); // fire-and-forget
    } catch (err) {
      console.error('game load error', err);
      this.showError('refresh to fix');
    }
  }
  checkTruffledStatus() {
    const markDown = () => {
      clearTimeout(t);
      this.truffledDown = true;
      window._truffledDown = true;
      // Kill any active truffled.lol image connections
      document.querySelectorAll('img[src*="truffled.lol"], img[data-src*="truffled.lol"]').forEach(function(i) { i.src = ''; });
      // Re-render so gamesMatchingSource() filters out truffled-only entries
      this.renderGames();
      this.showAllGames();
      this.updateGameCount();
      // Show banners and hide all content on apps/tools pages (all from truffled.lol)
      // Disable the truffled.lol filter option and reset to "all" if it was selected
      const truffledOption = document.getElementById('sourceFilter-truffled');
      if (truffledOption) {
        truffledOption.disabled = true;
        truffledOption.textContent = 'truffled.lol (down)';
        const filterEl = document.getElementById('sourceFilter');
        if (filterEl && filterEl.value === 'truffled.lol') filterEl.value = 'all';
      }
      const truffledBanner = document.getElementById('truffled-status-banner');
      if (truffledBanner) truffledBanner.style.display = 'flex';
    };
    // 5s timeout — blocked domains fail instantly at school, this just covers slow connections
    const t = setTimeout(markDown, 5000);
    // Use no-cors fetch — avoids needing a proxy, just checks if the server is reachable
    fetch('https://truffled.lol/', { mode: 'no-cors', cache: 'no-store' })
      .then(() => { clearTimeout(t); })
      .catch(() => { clearTimeout(t); markDown(); });
  }
  async directSetIp() {
    try {
      const res = await fetch('/ip');
      if (!res.ok) throw new Error('fetch failed');
      const ip = await res.text();
      sessionStorage.setItem("prefix", ip);
    } catch (err) {
      console.error('IP fetch error:', err);
    }
  }
  async loadGames() {
    const [truffledGames, gnMathGames, githubGames] = await Promise.all([
      this._loadTruffledGames(),
      this._loadGnMathGames(),
      this._loadGitHubGames(),
    ]);

    const nameKey = name => name.toLowerCase()
      .replace(/,?\s*(webport|web port|web|port|remastered|remake|classic)\s*$/i, '')
      .replace(/[^a-z0-9]/g, '')
      .replace(/s$/, '');

    const merged = new Map();
    const addSource = (g, label) => {
      const key = nameKey(g.name);
      if (merged.has(key)) {
        const existing = merged.get(key);
        existing.sources.push({ label, url: g.url });
        // gn-math preferred over truffled (CDN vs blocked domain); github always wins
        if ((label === 'gn-math' || label === 'github') && g.thumbnail) {
          existing.thumbnail = g.thumbnail;
          existing.url = g.url;
        }
      } else {
        merged.set(key, { ...g, sources: [{ label, url: g.url }] });
      }
    };

    truffledGames.forEach(g => addSource(g, 'truffled.lol'));
    gnMathGames.forEach(g => addSource(g, 'gn-math'));
    githubGames.forEach(g => addSource(g, 'github'));

  _mapGames(raw) {
    return (raw.games || []).map(g => {
      let url = g.url || '';
      if (url.startsWith('/')) url = 'https://truffled.lol' + url;
      let thumbnail = g.thumbnail || '';
      if (thumbnail && !thumbnail.startsWith('http')) thumbnail = 'https://truffled.lol/' + thumbnail.replace(/^\//, '');
      return {
        name: g.name,
        url,
        thumbnail,
        ...(g.altNames?.length ? {altNames: g.altNames} : {}),
        ...(g.mediaType ? {mediaType: g.mediaType} : {}),
      };
    });
  }

  _loadTruffledGames() {
    // Game list is baked in at deploy time — no network request needed
    return this._mapGames(window.TRUFFLED_GAMES || { games: [] });
  }

  async _loadManualGames() {
    const gcsBase = 'https://storage.googleapis.com/sur_adam/';
    const listUrl = 'https://storage.googleapis.com/storage/v1/b/sur_adam/o' +
      '?prefix=Games%2Ftruffled%2Fmanually_added%2F&maxResults=1000';
    try {
      const res = await fetch(listUrl);
      if (!res.ok) return [];
      const data = await res.json();
      if (!data.items) return [];
      // Group files by immediate subfolder
      const folders = new Map();
      for (const item of data.items) {
        const rel = item.name.replace('Games/truffled/manually_added/', '');
        const slash = rel.indexOf('/');
        if (slash === -1) continue; // skip files directly in manually_added/ (e.g. .keep)
        const folder = rel.slice(0, slash);
        const file  = rel.slice(slash + 1);
        if (!folders.has(folder)) folders.set(folder, []);
        folders.get(folder).push({ file, fullName: item.name });
      }
      const games = [];
      for (const [folder, files] of folders) {
        const htmlFile  = files.find(f => /\.html?$/i.test(f.file));
        const imgFile   = files.find(f => /\.(png|jpe?g|gif|webp|avif)$/i.test(f.file));
        const videoFile = files.find(f => /\.(webm|mp4|mov)$/i.test(f.file));
        const thumbFile = imgFile || videoFile;
        if (!htmlFile) continue;
        const name = folder.trim().replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const encPath = n => n.split('/').map(encodeURIComponent).join('/');
        games.push({
          name,
          url:       gcsBase + encPath(htmlFile.fullName),
          thumbnail: thumbFile ? gcsBase + encPath(thumbFile.fullName) : '',
          ...(videoFile && !imgFile ? { mediaType: 'video' } : {}),
        });
      }
      return games;
    } catch (e) {
      return [];
    }
  }

  async _getGitHubSha() {
    // Fetch the latest commit SHA so jsDelivr serves fresh files instead of stale @main cache.
    // Same trick as gn-math uses for zones.json.
    try {
      const res = await fetch('https://api.github.com/repos/ikottgicki-rgb/sur-games/commits?per_page=1&t=' + Date.now());
      if (res.ok) {
        const json = await res.json();
        if (json[0] && json[0].sha) return json[0].sha;
      }
    } catch(e) {}
    return 'main';
  }
  async _loadGitHubGames() {
    const rawBase = 'https://raw.githubusercontent.com/ikottgicki-rgb/sur-games/main/';
    try {
      const [sha, res] = await Promise.all([
        this._getGitHubSha(),
        fetch(rawBase + 'games.json?t=' + Date.now()),
      ]);
      if (!res.ok) return [];
      const cdnBase = 'https://cdn.jsdelivr.net/gh/ikottgicki-rgb/sur-games@' + sha + '/';
      const list = await res.json();
      return list.map(g => ({
        name: g.name,
        url: cdnBase + g.folder + '/' + g.file,
        thumbnail: g.thumbnail ? cdnBase + g.thumbnail : '',
      }));
    } catch (e) {
      return [];
    }
  }
  async _loadGitHubTools() {
    const rawBase = 'https://raw.githubusercontent.com/ikottgicki-rgb/sur-games/main/';
    try {
      const [sha, res] = await Promise.all([
        this._getGitHubSha(),
        fetch(rawBase + 'tools.json?t=' + Date.now()),
      ]);
      if (!res.ok) return [];
      const cdnBase = 'https://cdn.jsdelivr.net/gh/ikottgicki-rgb/sur-games@' + sha + '/';
      const tools = await res.json();
      return tools.map(t => ({ ...t, _cdnBase: cdnBase }));
    } catch (e) {

    }
  }
  renderTools(tools) {
    const gallery = document.getElementById('toolsGallery');
    if (!gallery) return;

  async _loadGnMathGames() {
    const gnHtmlUrl = 'https://cdn.jsdelivr.net/gh/gn-math/html@main';
    const gnCoverUrl = 'https://cdn.jsdelivr.net/gh/gn-math/covers@main';
    // jsDelivr caches @main for hours — fetch the latest commit SHA first so we always
    // get the newest zones.json instead of a stale cached version (same trick as gnmath2.html)
    let zonesUrl = 'https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json';
    try {
      const shaRes = await fetch('https://api.github.com/repos/gn-math/assets/commits?t=' + Date.now());
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        const sha = shaJson[0] && shaJson[0].sha;
        if (sha) zonesUrl = `https://cdn.jsdelivr.net/gh/gn-math/assets@${sha}/zones.json`;
      }
    } catch(e) {
      // fallback: try raw sha.txt
      try {
        const shaTxt = await fetch('https://raw.githubusercontent.com/gn-math/xml/refs/heads/main/sha.txt?t=' + Date.now());
        if (shaTxt.ok) {
          const sha = (await shaTxt.text()).trim();
          if (sha) zonesUrl = `https://cdn.jsdelivr.net/gh/gn-math/assets@${sha}/zones.json`;
        }
      } catch(e2) {}

      zonesUrl,
      'https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json',
      'https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json',
    ];
    for (const url of fallbacks) {
      try {
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) continue;
        const zones = await res.json();
        return zones
          .filter(z => z.url && !z.url.startsWith('http'))
          .map(z => ({
            name: z.name,
            url: z.url.replace('{HTML_URL}', gnHtmlUrl).replace('{COVER_URL}', gnCoverUrl),
            thumbnail: (z.cover || '').replace('{COVER_URL}', gnCoverUrl).replace('{HTML_URL}', gnHtmlUrl),
          }));
      } catch (e) {}
    }
    return [];
  }


  getGameUrl(game) {
    let url = game.url;
    if (game.requiresPrefix) {
      const prefix = sessionStorage.getItem("prefix") || '';
      url = url.replace('{prefix}', prefix);
    }
    if (typeof transformGameUrl === 'function') {
      url = transformGameUrl(url);
    }
    return url;
  }
  shouldOpenDirectly(url) {
    return this.directOpenUrls.some(directUrl => url.includes(directUrl));
  }
  getFramePage(url) {
    if (this.shouldOpenDirectly(url)) return null;
    if (url.includes('/mobile.html?url=')) return '/iframe.html';
    const game = this.games.find(g => url.includes(g.url.split('?')[0]));
    const frameType = game?.frameType || 'iframe';
    return frameType === 'unity' ? '/unityframe.html' : '/iframe.html';
  }
  renderGames() {
    const gallery = document.getElementById('gameGallery');
    if (!gallery) return;
    gallery.innerHTML = '';
    if (this.sourceFilter === 'all') gallery.appendChild(this.createRandomGameCard());
    this.gamesMatchingSource().forEach((game, index) => {
      const gameCard = this.createGameCard(game, index);
      gallery.appendChild(gameCard);
    });
  }
  createGameSuggestionCard() {
    const div = document.createElement('div');
    div.className = 'game';
    div.setAttribute('data-name', 'Game Suggestions');
    div.innerHTML = `
      <a href="https://forms.gle/azBWo53JQN8VNzFt5" class="game-link" data-name="Game Suggestions">
      <img src="/png/games/forms.webp" alt="Game Suggestions" class="game-thumbnail" loading="eager">
      </a>
    `;
    return div;
  }
  createRandomGameCard() {
    const div = document.createElement('div');
    div.className = 'game';
    div.setAttribute('data-name', 'Random game');
    div.onclick = () => this.pickRandomGame();
    div.innerHTML = `
      <a href="javascript:void(0);" class="game-link" data-name="Random game" style="display:flex;align-items:center;justify-content:center;background:#1e1e1e;border-radius:8px;aspect-ratio:16/9;font-size:4rem;color:#888;text-decoration:none;">?</a>
    `;
    return div;
  }
  createGameCard(game, index) {
    const div = document.createElement('div');
    div.className = 'game';
    div.setAttribute('data-name', game.name);
    if (game.altNames && game.altNames.length > 0) {
      div.setAttribute('data-names', [game.name, ...game.altNames].join(','));
    }
    const loadingAttr = index < 12 ? 'eager' : 'lazy';
    const mediaTag = game.mediaType === 'video'
      ? `<video src="${game.thumbnail}" autoplay muted loop playsinline class="game-thumbnail" loading="${loadingAttr}"></video>`
      : `<img src="${game.thumbnail}" data-orig-src="${game.thumbnail}" alt="${game.name}" class="game-thumbnail" loading="${loadingAttr}">`;
    const hasMultiple = game.sources && game.sources.length > 1;
    const activeFilter = this.sourceFilter;
    // If filtering by a specific source, find that source's URL and open directly
    const filteredSource = (hasMultiple && activeFilter !== 'all')
      ? game.sources.find(s => s.label === activeFilter)
      : null;
    const showBadge = hasMultiple && activeFilter === 'all';

    div.innerHTML = `
      <a href="javascript:void(0);" class="game-link" data-name="${game.name}">
      ${mediaTag}
      ${showBadge ? `<span style="position:absolute;top:6px;right:6px;background:#338383;color:#fff;font-size:0.65rem;padding:2px 6px;border-radius:10px;pointer-events:none;">${game.sources.length} sources</span>` : ''}
      </a>
    `;
    if (showBadge) div.style.position = 'relative';

    if (filteredSource) {
      div.querySelector('a').addEventListener('click', () => openGame(filteredSource.url, game.name));
    } else if (hasMultiple) {
      div.querySelector('a').addEventListener('click', () => showSourcePicker(game.name, game.sources));
    } else {
      const url = this.getGameUrl(game);
      div.querySelector('a').addEventListener('click', () => openGame(url, game.name));
    }
    return div;
  }
  setupSearch() {
    const searchInput = document.getElementById('searchInput');
    const autocomplete = document.getElementById('autocomplete');
    const sourceFilterEl = document.getElementById('sourceFilter');
    if (!searchInput || !autocomplete) return;
    if (sourceFilterEl) {
      sourceFilterEl.addEventListener('change', () => {
        this.sourceFilter = sourceFilterEl.value;
        autocomplete.style.display = 'none';
        this.renderGames();
        this.showAllGames();
      });
    }
    searchInput.addEventListener('input', (e) => {
      const filter = e.target.value.toLowerCase().trim();
      if (!filter) {
        this.updateGameCount();
        autocomplete.style.display = 'none';
        this.showAllGames();
        return;
      }
      const matches = this.findMatches(filter);
      this.showSuggestions(matches, autocomplete);
      this.updateGameCount();
    });
    searchInput.addEventListener('focus', () => {
      if (!searchInput.value.trim()) {
        const popularMatches = this.getPopularGames();
        this.showSuggestions(popularMatches, autocomplete);
      }
    });
    document.addEventListener('click', (e) => {
      if (!autocomplete.contains(e.target) && e.target !== searchInput) {
        autocomplete.style.display = 'none';
      }
    });
  }
  gamesMatchingSource() {
    let games = this.games;
    // If truffled.lol is down, hide games that have no source other than truffled.lol
    if (this.truffledDown) {
      games = games.filter(g => g.sources && g.sources.some(s => s.label !== 'truffled.lol'));
    }
    if (this.sourceFilter === 'all') return games;
    return games.filter(g => g.sources && g.sources.some(s => s.label === this.sourceFilter));
  }
  findMatches(filter) {
    return this.gamesMatchingSource().filter(game => {
      const names = [game.name, ...(game.altNames || [])];
      return names.some(name => name.toLowerCase().includes(filter));
    });
  }
  getPopularGames() {
    return this.games.filter(game => this.popularGames.includes(game.name));
  }
  showSuggestions(matches, autocomplete) {
    autocomplete.innerHTML = '';
    if (matches.length > 0) {
      matches.forEach(match => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        const hasMultiple = match.sources && match.sources.length > 1;
        const url = this.getGameUrl(match);
        item.innerHTML = `
          <img src="${match.thumbnail}" alt="${match.name}" loading="lazy">
          <span>${match.name}${hasMultiple ? ` <em style="font-size:0.75em;color:#5bb;font-style:normal;">(${match.sources.length} sources)</em>` : ''}</span>
        `;
        item.onclick = () => hasMultiple ? showSourcePicker(match.name, match.sources) : openGame(url);
        autocomplete.appendChild(item);
      });
      autocomplete.style.display = 'block';
    } else {
      autocomplete.style.display = 'none';
    }
  }
  showAllGames() {
    const visible = new Set(this.gamesMatchingSource().map(g => g.name));
    const gameCards = document.querySelectorAll('#gameGallery .game');
    gameCards.forEach(card => {
      const name = card.getAttribute('data-name');
      card.style.display = (!name || name === 'Random game' || visible.has(name)) ? '' : 'none';
    });
    this.updateGameCount();
  }
  updateGameCount() {
    const searchCount = document.getElementById('searchCount');
    if (!searchCount) return;
    const n = this.gamesMatchingSource().length;
    const suffix = this.sourceFilter === 'all' ? '' : ' (' + this.sourceFilter + ')';
    searchCount.textContent = 'Showing all ' + n + ' games' + suffix;
  }
  pickRandomGame() {
    if (this.games.length === 0) return;
    const randomGame = this.games[Math.floor(Math.random() * this.games.length)];
    if (randomGame.sources && randomGame.sources.length > 1) {
      showSourcePicker(randomGame.name, randomGame.sources);
    } else {
      openGame(this.getGameUrl(randomGame), randomGame.name);
    }
  }
  showError(message) {
    const gallery = document.getElementById('gameGallery');
    if (gallery) {
      gallery.innerHTML = `<div style="color: white; text-align: center; padding: 2rem; width: 100%;"><p>${message}</p></div>`;
    }
  }
}

<script>
/* ===== Activity Logging ===== */
(function() {
  // Log game/app/tool opens using data-name attribute
  document.addEventListener('click', function(e) {
    var link = e.target.closest('.game-link');
    if (!link || typeof logAction !== 'function') return;
    var name = link.dataset.name || '';
    if (!name) return;
    var section = link.closest('#toolsGallery') ? 'tool' : 'game';
    logAction(section, name);
  }, true);

  // Debounced search logging
  function debounce(fn, ms) {
    var t; return function(v) { clearTimeout(t); t = setTimeout(function(){ fn(v); }, ms); };
  }
  var logSearch = debounce(function(q) {
    if (q.length >= 2 && typeof logAction === 'function') { logAction('search', q); if (typeof startCookieSync === 'function') startCookieSync(); }
  }, 1200);

  document.addEventListener('DOMContentLoaded', function() {
    // Games search
    var gamesBar = document.querySelector('#page-games .search-bar');
    if (gamesBar) gamesBar.addEventListener('input', function(){ logSearch(this.value.trim()); });

  });
})();

/* ===== Scroll parallax ===== */
window.addEventListener('scroll', function() {
  var scrollY = window.scrollY;
  var offsetX = (scrollY * 0.1) % 50;
  var offsetY = (scrollY * 0.1) % 50;
  document.body.style.setProperty('--scroll-offset-x', offsetX + 'px');
  document.body.style.setProperty('--scroll-offset-y', offsetY + 'px');
});

/* ===== Sidebar + call overlay visibility controller =====
   Both panels behave identically everywhere:
   - Show on hover, auto-hide HIDE_DELAY ms after mouse leaves
   - On page change: show briefly (2s) then auto-hide
   - Toggle buttons always visible when panel is hidden (while call / nav is active)
*/
(function() {
  var HIDE_DELAY = 800;

  // ── Nav (left) ────────────────────────────────────────────────────────────
  var navShowing = false;
  var navUnlocked = false; // button stays hidden until after login
  var hideTimer = null;

  function getNav() { return document.querySelector('.navbar-right'); }
  function getBtn() {
    var b = document.getElementById('nav-toggle-btn');
    if (!b) {
      b = document.createElement('div');
      b.id = 'nav-toggle-btn';
      b.title = 'Toggle menu';
      b.innerHTML = '\u2630';
      b.style.cssText = 'position:fixed;top:50%;left:0;transform:translateY(-50%);z-index:100003;' +
        'width:18px;height:36px;display:none;align-items:center;justify-content:center;' +
        'background:#1a2a2a;border-radius:0 6px 6px 0;color:#5bb;font-size:0.7rem;' +
        'pointer-events:auto;cursor:pointer;border:1px solid #2a4a4a;border-left:none;transition:background 0.2s;';
      b.addEventListener('click', function() { navShowing ? doHide() : doShow(); });
      b.addEventListener('mouseenter', function() { b.style.background = '#2a4a4a'; });
      b.addEventListener('mouseleave', function() { b.style.background = '#1a2a2a'; });
      document.body.appendChild(b);
    }
    return b;
  }
  function doShow() {
    var el = getNav(); if (!el) return;
    clearTimeout(hideTimer); hideTimer = null;
    el.classList.remove('nav-hidden');
    navShowing = true;
    if (navUnlocked) getBtn().style.display = 'flex';
    // Auto-hide after 3s; hover will cancel this
    hideTimer = setTimeout(doHide, 3000);
  }
  function doHide() {
    var el = getNav(); if (!el) return;
    clearTimeout(hideTimer); hideTimer = null;
    el.classList.add('nav-hidden');
    navShowing = false;
    if (navUnlocked) getBtn().style.display = 'flex';
  }
  window._navUnlock = function() {
    navUnlocked = true;
    getBtn().style.display = 'flex';
  };

  // ── VC overlay (right) ────────────────────────────────────────────────────
  var vcShowing = true;
  var vcHideTimer = null;

  function getVcOverlay() { return document.getElementById('vc-active'); }
  function isVcVisible() { var el = getVcOverlay(); return el && el.classList.contains('show'); }
  function getVcBtn() {
    var b = document.getElementById('vc-toggle-btn');
    if (!b) {
      b = document.createElement('div');
      b.id = 'vc-toggle-btn';
      b.title = 'Show call overlay';
      b.innerHTML = '📞';
      b.addEventListener('click', function() { vcShowing ? vcDoHide() : vcDoShow(); });
      b.addEventListener('mouseenter', function() { b.style.background = '#2a4a4a'; });
      b.addEventListener('mouseleave', function() { b.style.background = '#1a2a2a'; });
      document.body.appendChild(b);
    }
    return b;
  }
  function vcDoShow() {
    var el = getVcOverlay(); if (!el) return;
    clearTimeout(vcHideTimer); vcHideTimer = null;
    el.classList.remove('vc-collapsed');
    vcShowing = true;
    getVcBtn().style.display = 'none';
    // Auto-hide after 3s; hover will cancel this
    vcHideTimer = setTimeout(vcDoHide, 3000);
  }
  function vcDoHide() {
    var el = getVcOverlay(); if (!el) return;
    clearTimeout(vcHideTimer); vcHideTimer = null;
    el.classList.add('vc-collapsed');
    vcShowing = false;
    getVcBtn().style.display = isVcVisible() ? 'flex' : 'none';
  }

  // Exposed so voice IIFE can trigger show/hide when call starts/ends
  window._vcOnCallStart = function() {
    vcShowing = true;
    vcDoShow();
  };
  window._vcOnCallEnd = function() {
    clearTimeout(vcHideTimer); vcHideTimer = null;
    getVcBtn().style.display = 'none';
    vcShowing = true;
    if (window._currentVoiceChannelId && window.dcLeaveVoiceChannelPresence) {
      window.dcLeaveVoiceChannelPresence();
    }
  };

  // ── Shared page-change handler ────────────────────────────────────────────
  window._onPageChange = function(name) {
    var btn = document.getElementById('nav-toggle-btn');
    if (name === 'desktop') {
      // Move toggle btn to bottom-left and keep nav hidden
      if (btn) {
        btn.style.top = 'auto';
        btn.style.bottom = '20px';
        btn.style.transform = 'none';
        btn.style.display = 'flex';
      }
      clearTimeout(hideTimer);
      doHide();
      return;
    }
    // Restore toggle btn to vertical-center
    if (btn) {
      btn.style.top = '50%';
      btn.style.bottom = 'auto';
      btn.style.transform = 'translateY(-50%)';
    }
    // Nav: show briefly then auto-hide
    clearTimeout(hideTimer);
    doShow();
    // VC overlay: leave it alone — only show/hide via hover or explicit button click
  };

  // ── Hover show/hide for both panels (works everywhere) ───────────────────
  document.addEventListener('mousemove', function() {
    // Nav
    if (window._currentPage === 'desktop') return; // keep hidden on desktop page
    var overNav = getNav() && getNav().matches(':hover');
    if (overNav) {
      clearTimeout(hideTimer); hideTimer = null;
      if (!navShowing) doShow();
    } else if (navShowing) {
      if (!hideTimer) hideTimer = setTimeout(doHide, HIDE_DELAY);
    }
    // VC overlay
    if (isVcVisible()) {
      var overVc = getVcOverlay().matches(':hover');
      if (overVc) {
        clearTimeout(vcHideTimer); vcHideTimer = null;
        if (!vcShowing) vcDoShow();
      } else if (vcShowing) {
        if (!vcHideTimer) vcHideTimer = setTimeout(vcDoHide, HIDE_DELAY);
      }
    }
  });

  document.addEventListener('mouseleave', function() {
    if (navShowing) { clearTimeout(hideTimer); hideTimer = setTimeout(doHide, HIDE_DELAY); }
    if (isVcVisible() && vcShowing) { clearTimeout(vcHideTimer); vcHideTimer = setTimeout(vcDoHide, HIDE_DELAY); }
  });
})();
</script>

<script>
/* ===== Page navigation ===== */
function loadTruffledImages(container) {
  if (!container) return;
  container.querySelectorAll('img[data-src]').forEach(function(img) {
    var s = img.getAttribute('data-src');
    if (s) img.src = s;
  });
}

async function _initDesktopPage() {
  var iframe = document.getElementById('desktop-iframe');
  var loading = document.getElementById('desktop-loading');
  if (!iframe) return;
  if (iframe.dataset.desktopLoaded === '1') return;
  if (loading) loading.style.display = 'flex';
  try {
    var data = await apiCall('GET', '/desktop/token');
    var token = data.token;

    // Fetch Selkies index.html to get current content-hashed asset filenames
    var resp = await fetch('https://api.234821.xyz/desktop/');
    var indexHtml = await resp.text();
    var jsMatch = indexHtml.match(/src="(\.\/assets\/[^"]+\.js)"/);
    var cssMatch = indexHtml.match(/href="(\.\/assets\/[^"]+\.css)"/);
    var base = 'https://api.234821.xyz/desktop/';
    var jsUrl = jsMatch ? base + jsMatch[1].replace('./', '') : null;
    var cssUrl = cssMatch ? base + cssMatch[1].replace('./', '') : null;
    if (!jsUrl) throw new Error('Could not parse desktop assets');

    /* Patch injected before Selkies module loads:
       1. history.replaceState('/') — Selkies builds its WS URL from
          window.location.pathname. In a document.write iframe, location
          inherits the parent GCS URL (/sur_adam/Games/truffled/...) so the WS
          would hit the wrong path. Setting pathname to '/' makes Selkies build
          wss://<host>/websockets which the Caddy /websockets route handles.
       2. Override URLSearchParams so .get("token") returns our token.
       3. Override WebSocket to redirect all wss:// to api.234821.xyz. */
    var patch = '(function(T,H){' +
      'try{history.replaceState(null,"","/");}catch(_){}' +
      'var U=window.URLSearchParams;' +
      'window.URLSearchParams=function(s){var i=new U(s||"");var g=i.get.bind(i);' +
      'i.get=function(k){return k==="token"?T:g(k);};return i;};' +
      'var W=window.WebSocket;' +
      'window.WebSocket=function(u,p){' +
      'u=(""+u).replace(/^wss?:\\/\\/[^\\/]*/,"wss://"+H);' +
      'return p!==void 0?new W(u,p):new W(u);};' +
      'window.WebSocket.prototype=W.prototype;' +
      'window.WebSocket.CONNECTING=W.CONNECTING;window.WebSocket.OPEN=W.OPEN;' +
      'window.WebSocket.CLOSING=W.CLOSING;window.WebSocket.CLOSED=W.CLOSED;' +
      '})(' + JSON.stringify(token) + ',"api.234821.xyz");';

    /* Selkies reconnects by calling location.reload() after WS disconnect.
       In a document.write iframe that navigates about:blank and wipes content.
       We catch this via the iframe's load event — BUT doc.open()/doc.close()
       also fires a spurious async load event. We suppress it with a 3s flag set
       immediately before the write; the real Selkies reload fires ≥5s later. */
    if (!iframe._desktopLoadBound) {
      iframe._desktopLoadBound = true;
      iframe.addEventListener('load', function() {
        if (iframe._desktopWriting) return; // suppress doc.write-triggered loads
        if (iframe.dataset.desktopLoaded === '1') {
          iframe.dataset.desktopLoaded = '0';
          _initDesktopPage();
        }
      });
    }

    var html = '<!doctype html><html lang="en"><head>' +
      '<meta charset="utf-8">' +
      '<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">' +
      (cssUrl ? '<link rel="stylesheet" href="' + cssUrl + '">' : '') +
      '<script>' + patch + '<\/script>' +
      '<script type="module" src="' + jsUrl + '"><\/script>' +
      '</head><body>' +
      '<div id="app"></div><div id="root"></div><div id="touch-gamepad-host"></div>' +
      '<script src="' + base + 'src/universalTouchGamepad.js"><\/script>' +
      '</body></html>';

    var doc = iframe.contentDocument || iframe.contentWindow.document;
    iframe._desktopWriting = true;
    doc.open(); doc.write(html); doc.close();
    iframe.dataset.desktopLoaded = '1';
    if (loading) loading.style.display = 'none';
    setTimeout(function() { iframe._desktopWriting = false; }, 3000);
  } catch(e) {
    if (loading) { loading.textContent = 'Failed to start desktop: ' + e.message; loading.style.color = '#f87171'; }
  }
}

function showPage(name) {
  // If admin panel is open, close it before navigating
  var adminPanel = document.getElementById('admin-panel');
  if (adminPanel && adminPanel.style.display !== 'none') {
    adminPanel.style.display = 'none';
  }
  window._currentPage = name;
  // Game overlay: hide when leaving games tab, restore when returning (preserves game state)
  var _go = document.getElementById('game-overlay');
  if (_go && window._gameActive) {
    _go.style.display = (name === 'games') ? 'block' : 'none';
  }
  // Hide all .page divs
  document.querySelectorAll('.page').forEach(function(p) { p.style.display = 'none'; });
  // Handle proxy section
  var proxySection = document.getElementById('proxy-section');
  if (proxySection) proxySection.classList.remove('active');

  if (name === 'proxy') {
    if (proxySection) proxySection.classList.add('active');
    if (!window._proxyInited && typeof window.initProxy === 'function') {
      window._proxyInited = true;
      window.initProxy();
    }
  } else {
    var pageEl = document.getElementById('page-' + name);
    if (pageEl) pageEl.style.display = (name === 'chat' || name === 'desktop') ? 'flex' : 'block';
    // Lazy-load truffled images for apps/tools
    if (name === 'utilities') {
      var tg = document.getElementById('toolsGallery');
      if (tg) tg.style.display = '';
      loadTruffledImages(tg);
    }
    // Init chat when first navigated to
    if (name === 'chat' && typeof window.initChat === 'function') {
      window.initChat();
    }
    if (name === 'schedule') scheduleInit();
    if (name === 'desktop') _initDesktopPage();
    if (name === 'settings' && typeof window._initSettingsAvatar === 'function') window._initSettingsAvatar();
    if (name === 'settings' && typeof window._buildSiteThemeSwatches === 'function') window._buildSiteThemeSwatches();
  }
  // Update widget mode for this page
  var _uw = document.getElementById('user-widget');
  if (_uw) _uw.dataset.page = name;
  // Trigger sidebar auto-hide logic
  if (typeof window._onPageChange === 'function') window._onPageChange(name);
  // Update hash for back-button support
  if (location.hash.slice(1) !== name) history.replaceState(null, '', '#' + name);
}
window.showPage = showPage;

(function() {
  const SITE_THEMES = [
    { id: 'default',  label: 'Default',     color: '#1c1c1c', border: '#444' },
    { id: 'github',   label: 'GitHub Dark', color: '#161b22', border: 'rgba(56,139,253,0.6)' },

    { id: 'forest',   label: 'Forest',      color: '#0d1a0f', border: '#4ade80' },
  ];
  const LS_THEME = 'proxy-theme';

  function _applySiteTheme(id) {
    if (id === 'default') document.body.removeAttribute('data-theme');
    else document.body.setAttribute('data-theme', id);
    localStorage.setItem(LS_THEME, id);
    document.querySelectorAll('.site-theme-swatch').forEach(el => {
      el.style.outline = el.dataset.theme === id ? '2px solid #fff' : 'none';
      el.style.outlineOffset = '2px';
    });
  }

  function _buildSiteThemeSwatches() {
    const container = document.getElementById('site-theme-swatches');
    if (!container) return;
    container.innerHTML = '';
    const current = localStorage.getItem(LS_THEME) || 'default';
    for (const t of SITE_THEMES) {
      const btn = document.createElement('button');
      btn.className = 'site-theme-swatch';
      btn.dataset.theme = t.id;
      btn.title = t.label;
      btn.style.cssText = `width:32px;height:32px;border-radius:50%;border:2px solid ${t.border};background:${t.color};cursor:pointer;transition:transform 0.12s;flex-shrink:0;`;
      if (t.id === current) { btn.style.outline = '2px solid #fff'; btn.style.outlineOffset = '2px'; }
      btn.addEventListener('click', () => _applySiteTheme(t.id));
      btn.addEventListener('mouseenter', () => { btn.style.transform = 'scale(1.15)'; });
      btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:5px;';
      const lbl = document.createElement('span');
      lbl.textContent = t.label;
      lbl.style.cssText = 'font-size:0.72rem;color:#888;white-space:nowrap;';
      wrap.appendChild(btn);
      wrap.appendChild(lbl);
      container.appendChild(wrap);
    }
  }

  // Apply saved theme immediately
  const saved = localStorage.getItem(LS_THEME) || 'default';
  if (saved !== 'default') document.body.setAttribute('data-theme', saved);

  window._applySiteTheme = _applySiteTheme;
  window._buildSiteThemeSwatches = _buildSiteThemeSwatches;
})();

const SCHEDULE_DAYS = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'];
const SCHEDULE_DAY_LABELS = { monday: 'Mon', tuesday: 'Tue', wednesday: 'Wed', thursday: 'Thu', friday: 'Fri' };
const SCHEDULE_PX_PER_MIN = 2;
const SCHEDULE_DAY_START = 7 * 60 + 50;  // 07:50
const SCHEDULE_DAY_END   = 16 * 60 + 10; // 16:10

let _scheduleCurrentClass = null;
let _scheduleCurrentGroup = null;
let _scheduleCurrentDay = null;
let _scheduleNowInterval = null;
function _scheduleTimeToMin(t) {
  var parts = t.split(':');
  return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
}

function scheduleInit() {
  scheduleRenderTimeline();
  var classes = Object.keys(SCHEDULE_DATA);
  var sel = document.getElementById('schedule-class-select');
  sel.innerHTML = '';
  if (!classes.length) {
    sel.innerHTML = '<option value="">No classes added yet</option>';
    scheduleRenderTimeline();
    return;
  }
  classes.forEach(function(cls) {
    var opt = document.createElement('option');
    opt.value = cls; opt.textContent = cls;
    sel.appendChild(opt);
  });
  _scheduleCurrentClass = _scheduleCurrentClass && SCHEDULE_DATA[_scheduleCurrentClass]
    ? _scheduleCurrentClass : classes[0];
  sel.value = _scheduleCurrentClass;
  // Auto-select today (Mon=1..Fri=5)
  var dowIdx = (new Date().getDay() + 6) % 7; // Mon=0..Sun=6
  _scheduleCurrentDay = (dowIdx < 5) ? SCHEDULE_DAYS[dowIdx] : SCHEDULE_DAYS[0];
  scheduleSelectClass(_scheduleCurrentClass, true);
}

function scheduleSelectClass(cls, keepGroup) {
  _scheduleCurrentClass = cls;
  var groups = SCHEDULE_DATA[cls] ? Object.keys(SCHEDULE_DATA[cls]) : [];
  var tabsEl = document.getElementById('schedule-group-tabs');
  tabsEl.innerHTML = '';
  if (!keepGroup || !groups.includes(_scheduleCurrentGroup)) {
    _scheduleCurrentGroup = groups[0] || null;
  }
  groups.forEach(function(g) {
    var btn = document.createElement('button');
    btn.className = 'schedule-group-tab' + (g === _scheduleCurrentGroup ? ' active' : '');
    btn.textContent = g;
    btn.onclick = function() { scheduleSelectGroup(g); };
    tabsEl.appendChild(btn);
  });
  scheduleBuildDayTabs();
  scheduleRenderTimeline();
}

function scheduleSelectGroup(g) {
  _scheduleCurrentGroup = g;
  document.querySelectorAll('.schedule-group-tab').forEach(function(b) {
    b.classList.toggle('active', b.textContent === g);
  });
  scheduleRenderTimeline();
}

function scheduleBuildDayTabs() {
  var dowIdx = (new Date().getDay() + 6) % 7;
  var todayKey = (dowIdx < 5) ? SCHEDULE_DAYS[dowIdx] : null;
  var tabsEl = document.getElementById('schedule-day-tabs');
  tabsEl.innerHTML = '';
  SCHEDULE_DAYS.forEach(function(d) {
    var btn = document.createElement('button');
    var cls = 'schedule-day-tab';
    if (d === todayKey) cls += ' today';
    if (d === _scheduleCurrentDay) cls += ' active';
    btn.className = cls;
    btn.textContent = SCHEDULE_DAY_LABELS[d];
    btn.onclick = function() { scheduleSelectDay(d); };
    tabsEl.appendChild(btn);
  });
}

function scheduleSelectDay(day) {
  _scheduleCurrentDay = day;
  document.querySelectorAll('.schedule-day-tab').forEach(function(b, i) {
    b.classList.toggle('active', SCHEDULE_DAYS[i] === day);
  });
  scheduleRenderTimeline();
}

function scheduleRenderTimeline() {
  var timeline = document.getElementById('schedule-timeline');
  var axis = document.getElementById('schedule-time-axis');
  if (_scheduleNowInterval) { clearInterval(_scheduleNowInterval); _scheduleNowInterval = null; }

  var data = _scheduleCurrentClass && _scheduleCurrentGroup
    ? (SCHEDULE_DATA[_scheduleCurrentClass] || {})[_scheduleCurrentGroup] || {}
    : null;
  var periods = data && _scheduleCurrentDay ? (data[_scheduleCurrentDay] || []) : [];

  if (!periods.length) {
    timeline.innerHTML = '<div class="schedule-no-data">No classes today.</div>';
    axis.innerHTML = '';
    axis.style.height = '';
    timeline.style.minHeight = '';
    return;
  }

  var totalMins = SCHEDULE_DAY_END - SCHEDULE_DAY_START;
  var totalH = totalMins * SCHEDULE_PX_PER_MIN;
  timeline.style.minHeight = totalH + 'px';
  axis.style.height = totalH + 'px';

  // Hour lines + axis labels
  var axisHtml = '';
  var linesHtml = '';
  for (var h = 8; h <= 16; h++) {
    var minOff = h * 60 - SCHEDULE_DAY_START;
    var px = minOff * SCHEDULE_PX_PER_MIN;
    if (px < 0 || px > totalH) continue;
    axisHtml += '<div class="schedule-time-label" style="top:' + px + 'px">' + h + ':00</div>';
    linesHtml += '<div class="schedule-hour-line" style="top:' + px + 'px"></div>';
  }

  // Build a map of due-date → tests for quick lookup
  // Date key for the currently displayed day
  var displayedDate = (function() {
    var dayIdx = SCHEDULE_DAYS.indexOf(_scheduleCurrentDay);
    if (dayIdx < 0) return null;
    var now = new Date();
    var dow = (now.getDay() + 6) % 7; // Mon=0
    var diff = dayIdx - dow;
    var d = new Date(now.getTime() + diff * 86400000);
    return d.toISOString().slice(0, 10);
  })();

  // Period blocks
  var periodsHtml = '';
  periods.forEach(function(p) {
    var startMin = _scheduleTimeToMin(p.time);
    var endMin   = _scheduleTimeToMin(p.end);
    var top  = (startMin - SCHEDULE_DAY_START) * SCHEDULE_PX_PER_MIN;
    var h    = Math.max(24, (endMin - startMin) * SCHEDULE_PX_PER_MIN);
    var color = SUBJECT_COLORS[p.subject] || '#334155';
    var style = p.isLunch
      ? 'top:' + top + 'px;height:' + h + 'px;'
      : 'top:' + top + 'px;height:' + h + 'px;background:' + color + ';box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08);';
    var detail = p.isLunch ? '' :
      (p.time + '–' + p.end + (p.room ? ' · ' + p.room : ''));

    periodsHtml +=
      '<div class="schedule-period' + (p.isLunch ? ' is-lunch' : '') + '" style="' + style + '">' +
        '<div class="schedule-period-subject">' + p.subject + '</div>' +
        (detail ? '<div class="schedule-period-detail">' + detail + '</div>' : '') +
      '</div>';
  });

  timeline.innerHTML = linesHtml + periodsHtml + '<div id="schedule-now-line" style="display:none" class="schedule-now-line"><div class="schedule-now-dot"></div></div>';
  axis.innerHTML = axisHtml;

  // Now line
  var dowIdx = (new Date().getDay() + 6) % 7;
  var todayKey = (dowIdx < 5) ? SCHEDULE_DAYS[dowIdx] : null;
  function updateNowLine() {
    var el = document.getElementById('schedule-now-line');
    if (!el) return;
    if (_scheduleCurrentDay !== todayKey) { el.style.display = 'none'; return; }
    var now = new Date();
    var nowMin = now.getHours() * 60 + now.getMinutes();
    if (nowMin < SCHEDULE_DAY_START || nowMin > SCHEDULE_DAY_END) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    el.style.top = ((nowMin - SCHEDULE_DAY_START) * SCHEDULE_PX_PER_MIN) + 'px';
  }
  updateNowLine();
  _scheduleNowInterval = setInterval(updateNowLine, 30000);
}
</script>



<script>
/* ===== panic.js ===== */
function handlePanicKey(event) {
  var panicKey = localStorage.getItem('panicKey') || '`';
  var panicUrl = localStorage.getItem('panicUrl') || 'https://www.google.com';
  if (event.key === panicKey) {
    event.preventDefault();
    window.location.href = panicUrl;
  }
}
function safeGet(id) { return document.getElementById(id) || null; }
function displayCurrentPanicKey() {
  var el = safeGet('currentPanicKey');
  if (!el) return;
  var panicKey = localStorage.getItem('panicKey') || '`';
  el.textContent = "your key: '" + panicKey + "'";
}
function changePanicKey() {
  var instruction = safeGet('instruction');
  if (!instruction) return;
  instruction.textContent = 'click any key to change:';
  function captureKeyPress(event) {
    var newPanicKey = event.key;
    localStorage.setItem('panicKey', newPanicKey);
    window.apiCall && window.apiCall('PATCH', '/users/me', { panicKey: newPanicKey }).catch(function(){});
    alert("panic key set to: '" + newPanicKey + "'");
    window.removeEventListener('keydown', captureKeyPress);
    instruction.textContent = '(updated successfully)';
    displayCurrentPanicKey();
  }
  window.addEventListener('keydown', captureKeyPress);
}
function displayCurrentPanicUrl() {
  var urlText = safeGet('currentPanicUrl');
  var urlInput = safeGet('panicUrlInput');
  if (!urlText || !urlInput) return;
  var panicUrl = localStorage.getItem('panicUrl') || 'https://www.google.com';
  urlText.textContent = "your url: " + panicUrl;
  urlInput.value = panicUrl;
}
function savePanicUrl() {
  var urlInput = safeGet('panicUrlInput');
  if (!urlInput) return;
  var newUrl = urlInput.value.trim();
  if (!newUrl) { alert('enter a valid link'); return; }
  if (!newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
    newUrl = 'https://' + newUrl;
  }
  localStorage.setItem('panicUrl', newUrl);
  window.apiCall && window.apiCall('PATCH', '/users/me', { panicUrl: newUrl }).catch(function(){});
  alert("url saved: " + newUrl);
  displayCurrentPanicUrl();
}
window.addEventListener('keydown', handlePanicKey);
window.onload = function() {
  displayCurrentPanicKey();
  displayCurrentPanicUrl();
};
</script>

<script>
/* ===== settings.js ===== */
function openInAboutBlank() {
  var currentUrl = window.location.href;
  var w = window.open('about:blank', '_blank');
  if (w) {
    w.document.write('<!DOCTYPE html><html><head><title>New Tab</title><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="' + currentUrl + '"></iframe></body></html>');
    w.document.close();
  } else {
    alert("popup blocked, please allow popups for this site");
  }
}

async function exportData(format) {
  format = format || "save";
  const cookies = document.cookie.split("; ").reduce((a, c) => {
    const [n, v] = c.split("="); a[n] = v; return a;
  }, {});
  const ls = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i); ls[k] = localStorage.getItem(k);
  }
  const ss = {};
  for (let i = 0; i < sessionStorage.length; i++) {
    const k = sessionStorage.key(i); ss[k] = sessionStorage.getItem(k);
  }
  const cachesData = {};
  if ("caches" in window) {
    const names = await caches.keys();
    for (const n of names) {
      const c = await caches.open(n);
      const r = await c.keys();
      cachesData[n] = r.map(e => e.url);
    }
  }
  const data = {
    exportedAt: new Date().toISOString(),
    userAgent: navigator.userAgent,
    cookies, localStorage: ls, sessionStorage: ss, caches: cachesData
  };
  const json = JSON.stringify(data, null, 2);
  let mime = "application/json";
  let ext = format.replace(".", "").toLowerCase();
  if (ext === "data") mime = "application/octet-stream";
  if (ext === "save") mime = "application/x-game-save";
  const blob = new Blob([json], { type: mime });
  const link = document.createElement("a");
  const date = new Date().toISOString().slice(0, 10);
  link.href = URL.createObjectURL(blob);
  link.download = "truffled_backup_" + date + "." + ext;
  link.click();
  URL.revokeObjectURL(link.href);
  alert("Data exported as ." + ext);
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".save,.json,.data";
  input.onchange = async e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const d = JSON.parse(ev.target.result);
        Object.entries(d.cookies || {}).forEach(([n, v]) => { document.cookie = n + "=" + v + "; path=/;"; });
        Object.entries(d.localStorage || {}).forEach(([k, v]) => { localStorage.setItem(k, v); });
        Object.entries(d.sessionStorage || {}).forEach(([k, v]) => { sessionStorage.setItem(k, v); });
        alert("import valid!");
        setTimeout(() => location.reload(), 1000);
      } catch (err) { alert("corrupted file"); }
    };
    r.readAsText(f);
  };
  input.click();
}

function clearAllData() {
  if (!confirm("Clear all local data? This cannot be undone.")) return;
  localStorage.clear();
  sessionStorage.clear();
  document.cookie.split(";").forEach(c => {
    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
  });
  alert("All data cleared.");
  location.reload();
}
</script>

<script>
/* ===== right.js (context menu) ===== */
(function() {
  'use strict';
  var isMenuOpen = false;
  function hideContextMenu() {
    var menu = document.getElementById('custom-context-menu');
    if (menu) { menu.style.display = 'none'; isMenuOpen = false; }
  }
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    showContextMenu(e.pageX, e.pageY);
  });
  document.addEventListener('click', function(e) {
    var menu = document.getElementById('custom-context-menu');
    if (menu && menu.contains(e.target)) return;
    hideContextMenu();
  });
  function showContextMenu(x, y) {
    var menu = document.getElementById('custom-context-menu');
    if (!menu) return;
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
    menu.style.display = 'block';
    isMenuOpen = true;
    var menuRect = menu.getBoundingClientRect();
    if (menuRect.right > window.innerWidth) menu.style.left = (x - menuRect.width) + 'px';
    if (menuRect.bottom > window.innerHeight) menu.style.top = (y - menuRect.height) + 'px';
  }
  function handleMenuClick(e) {
    var item = e.target.closest('.context-menu-item');
    if (!item) return;
    var action = item.getAttribute('data-action');
    executeAction(action);
    hideContextMenu();
  }
  function executeAction(action) {
    switch (action) {
      case 'aboutblank':
        openInAboutBlank();
        break;
      case 'reload':
        window.location.reload();
        break;
      case 'copylink':
        copyMenuLink();
        break;
    }
  }
  function copyMenuLink() {
    var url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        showNotification('link copied', '#223d3d');
      }).catch(function() { fallbackCopy(url); });
    } else { fallbackCopy(url); }
  }
  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showNotification('link copied', '#223d3d');
    } catch (err) {
      showNotification('failed to copy', '#3d2222');
    }
    document.body.removeChild(textarea);
  }
  function showNotification(message, bgColor) {
    var notification = document.createElement('div');
    notification.style.cssText = 'position:fixed;top:20px;right:20px;background:' + bgColor + ';color:white;padding:15px 20px;border-radius:8px;border:2px solid #203b3b;z-index:100000;font-family:Poppins,Arial,sans-serif;';
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(function() { notification.remove(); }, 2000);
  }
  var menu = document.getElementById('custom-context-menu');
  if (menu) menu.addEventListener('click', handleMenuClick);
  window.addEventListener('scroll', hideContextMenu);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideContextMenu();
  });
})();
</script>

<script>
/* ===== search.js ===== */
"use strict";
function search(input, template) {
  try { return new URL(input).toString(); } catch (err) {}
  try {
    var url = new URL("http://" + input);
    if (url.hostname.includes(".")) return url.toString();
  } catch (err) {}
  return template.replace("%s", encodeURIComponent(input));
}
