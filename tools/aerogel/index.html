function tglM(){var m=$("modal");m.style.display=m.style.display==="flex"?"none":"flex";var sel=$("s-mdl");sel.innerHTML="";PROVIDERS.groq.models.forEach(function(mod){var o=document.createElement("option");o.value=mod.id;o.textContent=mod.name+(mod.vision?" vision":"");sel.appendChild(o)});$("s-mdl").value=db.params.mdl;$("s-tmp").value=db.params.temp;$("s-tp").value=db.params.topp;$("s-sys").value=db.params.sys;$("s-ctx").value=db.params.ctxLen}

function hdlF(el){Array.from(el.files).forEach(function(f){var reader=new FileReader();reader.onload=async function(ev){var data=ev.target.result;if(f.type.startsWith("image/"))data=await compressImg(data);pend.push({name:f.name,type:f.type.startsWith("image/")?"img":"txt",data:data});updFiles()};if(f.type.startsWith("image/"))reader.readAsDataURL(f);else reader.readAsText(f)});el.value=""}
function updFiles(){var p=$("file-pills");p.innerHTML="";pend.forEach(function(f,i){var t=document.createElement("div");t.className="f-t";t.innerHTML="<span>"+esc(f.name)+'</span><i class="fas fa-xmark" style="font-size:10px"></i>';t.onclick=function(){pend.splice(i,1);updFiles()};p.appendChild(t)});updBtns()}
function updBtns(){var has=$("inp").value.trim()||pend.length;$("sb").disabled=!has;$("eb").disabled=!$("inp").value.trim()}
async function scan(){try{var stream=await navigator.mediaDevices.getDisplayMedia({video:true});var video=document.createElement("video");video.srcObject=stream;await video.play();var canvas=document.createElement("canvas");canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext("2d").drawImage(video,0,0);var compressed=await compressImg(canvas.toDataURL("image/png"));pend.push({name:"scan_"+Date.now()+".jpg",type:"img",data:compressed});updFiles();stream.getTracks().forEach(function(t){t.stop()})}catch(e){}}
function clearAll(){if(!confirm("clear all chats, settings, and context?"))return;localStorage.removeItem("ag_v27");location.reload()}
function hasImgs(msgs){return msgs.some(function(m){return(m.files||[]).some(function(f){return f.type==="img"})})}
function copyMsg(idx){var c=db.chats.find(function(x){return x.id===db.active});if(c&&c.msgs[idx])navigator.clipboard.writeText(c.msgs[idx].content)}
function forkAt(idx){var src=db.chats.find(function(x){return x.id===db.active});if(!src)return;var id=Date.now().toString(36);var forked=JSON.parse(JSON.stringify(src.msgs.slice(0,idx+1)));db.chats.push({id:id,msgs:forked});db.active=id;save();render()}
async function enhance(){var val=$("inp").value.trim();if(!val||enhancing||busy)return;enhancing=true;$("eb").classList.add("enhancing");$("eb").disabled=true;try{var prov=PROVIDERS.groq;var resp=await fetch(prov.url,{method:"POST",headers:{"content-type":"application/json","authorization":"bearer "+rkey()},body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:ENHANCE_SYS},{role:"user",content:val}],temperature:0.4,top_p:0.9})});if(!resp.ok)throw new Error("enhance failed");var data=await resp.json();var enhanced=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;if(enhanced){enhanced=enhanced.trim().replace(/^["']|["']$/g,"");pendingEnhanced=enhanced;$("enh-diff").textContent=enhanced;$("enh-bar").classList.add("show")}}catch(e){$("enh-bar").classList.remove("show")}enhancing=false;$("eb").classList.remove("enhancing");updBtns()}
function useEnhanced(){if(pendingEnhanced){$("inp").value=pendingEnhanced;$("inp").style.height="auto";$("inp").style.height=$("inp").scrollHeight+"px";pendingEnhanced=""}$("enh-bar").classList.remove("show");updBtns();$("inp").focus()}
function skipEnhanced(){pendingEnhanced="";$("enh-bar").classList.remove("show");$("inp").focus()}
function render(){var list=$("chatlist");var msgBox=$("msgs");list.innerHTML="";$("cmbtn").className="cmbtn"+(db.cm?" on":"");$("ctx-ta").value=db.ctx;$("ctx-hdr").classList.toggle("open",db.ctxOpen);var curModel=PROVIDERS.groq.models.find(function(x){return x.id===db.params.mdl});$("mtag").textContent=curModel?curModel.name:db.params.mdl.split("/").pop();applySide();db.chats.slice().reverse().forEach(function(chat){var label=(chat.msgs.find(function(x){return x.role==="user"})?.content||"new chat").slice(0,28);var item=document.createElement("div");item.className="ci"+(chat.id===db.active?" on":"");item.innerHTML="<span>"+esc(label)+'</span><button class="del" onclick="event.stopPropagation();delC(\''+chat.id+"')\"><i class=\"fas fa-trash-can\"></i></button>";item.onclick=function(){db.active=chat.id;save();render();if(isMob())tglS()};list.appendChild(item)});msgBox.innerHTML="";var ac=db.chats.find(function(c){return c.id===db.active});if(ac&&!ac.msgs.length){var empty=document.createElement("div");empty.className="es";empty.innerHTML='<div class="es-i"><i class="fas fa-wind"></i></div><div class="es-t">aerogel</div><div class="es-d">ask anything to get started</div>';msgBox.appendChild(empty)}if(ac)ac.msgs.forEach(function(msg,mi){var wrap=document.createElement("div");wrap.className="mw";var div=document.createElement("div");div.className="mg "+(msg.role==="user"?"u":"a");var bub=document.createElement("div");bub.className="bb";if(msg.role==="user"){if(msg.files)msg.files.forEach(function(f){if(f.type==="img"){var im=new Image();im.src=f.data;bub.appendChild(im)}});var txt=document.createElement("div");txt.textContent=msg.content;bub.appendChild(txt);div.appendChild(bub);var ea=document.createElement("div");ea.className="ma";ea.style.justifyContent="flex-end";ea.innerHTML='<button onclick="editMsg('+mi+')"><i class="fas fa-pen"></i> edit</button><button onclick="forkAt('+mi+')"><i class="fas fa-code-branch"></i> fork</button>';div.appendChild(ea)}else{if(msg.thought&&msg.thought.trim()){var tb=document.createElement("div");tb.className="thk-b";var thEl=document.createElement("div");thEl.className="thk-h";thEl.innerHTML='<i class="fas fa-chevron-down"></i><span>reasoning</span>';thEl.onclick=function(){thEl.classList.toggle("open")};var tc=document.createElement("div");tc.className="thk-c";tc.textContent=msg.thought;tb.append(thEl,tc);div.appendChild(tb)}bub.innerHTML=renderMd(msg.content);div.appendChild(bub);var ra=document.createElement("div");ra.className="ma";ra.innerHTML='<button onclick="copyMsg('+mi+')"><i class="fas fa-copy"></i> copy</button><button onclick="forkAt('+mi+')"><i class="fas fa-code-branch"></i> fork</button>'+(mi===ac.msgs.length-1?'<button onclick="regen()"><i class="fas fa-rotate"></i> regenerate</button>':"");div.appendChild(ra)}wrap.appendChild(div);msgBox.appendChild(wrap)});msgBox.scrollTop=msgBox.scrollHeight}
function newC(){var id=Date.now().toString(36);db.chats.push({id:id,msgs:[]});db.active=id;save();render();if(isMob())tglS()}
function delC(id){db.chats=db.chats.filter(function(c){return c.id!==id});db.active=db.chats[0]?.id||null;if(!db.chats.length)newC();else{save();render()}}
async function generate(){if(busy)return;busy=true;abortC=new AbortController();_gth="";_gfn="";var chat=db.chats.find(function(x){return x.id===db.active});render();var wrap=document.createElement("div");wrap.className="mw";var div=document.createElement("div");div.className="mg a";var tb=document.createElement("div");tb.className="thk-b";var thdr=document.createElement("div");thdr.className="thk-h open";thdr.innerHTML='<i class="fas fa-circle-notch fa-spin"></i><span>thinking...</span>';var tcnt=document.createElement("div");tcnt.className="thk-c";tb.append(thdr,tcnt);var bub=document.createElement("div");bub.className="bb";div.append(tb,bub);wrap.appendChild(div);$("msgs").appendChild(wrap);var sendBtn=$("sb");sendBtn.innerHTML='<i class="fas fa-stop"></i>';sendBtn.disabled=false;sendBtn.onclick=function(){if(abortC)abortC.abort()};$("msgs").scrollTop=$("msgs").scrollHeight;try{var sys=db.params.sys||DEFAULT_SYS;if(db.ctx.trim())sys+="\n\n## user context\n"+db.ctx.trim();var prov=PROVIDERS.groq;var ctxLen=db.params.ctxLen||16;var recent=chat.msgs.slice(-ctxLen);var needsVision=hasImgs(recent);var mdl=db.params.mdl;var curMdl=prov.models.find(function(m){return m.id===mdl});if(needsVision&&(!curMdl||!curMdl.vision))mdl=prov.defaultVision;var history=[{role:"system",content:sys}];recent.forEach(function(m){var files=m.files||[];var imgs=files.filter(function(x){return x.type==="img"});var txts=files.filter(function(x){return x.type==="txt"});var text=m.content||"";txts.forEach(function(t){text="[file: "+t.name+"]\n"+t.data+"\n\n"+text});if(!text.trim()&&!imgs.length)text="(empty)";if(m.role==="assistant"){history.push({role:"assistant",content:text})}else if(imgs.length){history.push({role:"user",content:imgs.map(function(im){return{type:"image_url",image_url:{url:im.data}}}).concat([{type:"text",text:text||"describe this image"}])})}else{history.push({role:"user",content:text})}});var resp=await fetch(prov.url,{method:"POST",headers:{"content-type":"application/json","authorization":"bearer "+rkey()},body:JSON.stringify({model:mdl,messages:history,stream:true,temperature:db.params.temp,top_p:db.params.topp}),signal:abortC.signal});if(!resp.ok){var errData=await resp.json().catch(function(){return null});throw new Error(errData?.error?.message||"request failed ("+resp.status+")")}var reader=resp.body.getReader();var decoder=new TextDecoder();var acc="",buf="";while(true){var chunk=await reader.read();if(chunk.done)break;buf+=decoder.decode(chunk.value);var lines=buf.split("\n");buf=lines.pop();for(var idx=0;idx<lines.length;idx++){var line=lines[idx];if(!line.startsWith("data: "))continue;var payload=line.slice(6);if(payload==="[DONE]")continue;try{var parsed=JSON.parse(payload);var delta=parsed.choices&&parsed.choices[0]&&parsed.choices[0].delta&&parsed.choices[0].delta.content;if(!delta)continue;acc+=delta;var si=acc.indexOf("<thought>");var ei=acc.indexOf("</thought>");if(si!==-1){if(ei!==-1){_gth=acc.substring(si+9,ei);_gfn=acc.substring(0,si)+acc.substring(ei+10);thdr.innerHTML='<i class="fas fa-chevron-down"></i><span>reasoning</span>';thdr.classList.remove("open")}else{_gth=acc.substring(si+9);_gfn=acc.substring(0,si)}}else{_gfn=acc}if(_gth.trim())tcnt.textContent=_gth;var display=_gfn.replace(/<\/?thought>/g,"");var lastOpen=display.lastIndexOf("<");if(lastOpen!==-1&&display.indexOf(">",lastOpen)===-1)display=display.substring(0,lastOpen);display=display.trim();if(display)bub.innerHTML=renderMd(display);$("msgs").scrollTop=$("msgs").scrollHeight}catch(parseErr){}}}var final=_gfn.replace(/<\/?thought>/g,"").trim();chat.msgs.push({role:"assistant",content:final,thought:_gth});save();render()}catch(err){if(err.name==="AbortError"){var partial=_gfn.replace(/<\/?thought>/g,"").trim();if(partial){var c2=db.chats.find(function(x){return x.id===db.active});c2.msgs.push({role:"assistant",content:partial+"\n\n*[stopped]*",thought:_gth});save()}render()}else{var errEl=document.createElement("div");errEl.className="err-msg";errEl.textContent=err.message||"something went wrong";div.appendChild(errEl)}}busy=false;abortC=null;sendBtn.innerHTML='<i class="fas fa-arrow-up"></i>';sendBtn.onclick=send;updBtns()}
function send(){var val=$("inp").value.trim();if((!val&&!pend.length)||busy)return;var chat=db.chats.find(function(x){return x.id===db.active});chat.msgs.push({role:"user",content:val,files:[].concat(pend)});pend=[];updFiles();$("inp").value="";$("inp").style.height="auto";$("enh-bar").classList.remove("show");save();generate()}
function regen(){if(busy)return;var chat=db.chats.find(function(x){return x.id===db.active});if(!chat||!chat.msgs.length)return;if(chat.msgs[chat.msgs.length-1].role==="assistant")chat.msgs.pop();save();generate()}
function editMsg(idx){if(busy)return;var chat=db.chats.find(function(x){return x.id===db.active});if(!chat)return;$("inp").value=chat.msgs[idx].content;$("inp").style.height="auto";$("inp").dispatchEvent(new Event("input"));chat.msgs=chat.msgs.slice(0,idx);save();render();$("inp").focus()}
$("inp").oninput=function(){this.style.height="auto";this.style.height=this.scrollHeight+"px";updBtns()};
$("inp").onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}};
document.addEventListener("keydown",function(e){if(e.key==="n"&&(e.metaKey||e.ctrlKey)){e.preventDefault();newC()}});
