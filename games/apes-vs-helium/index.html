<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  <base href="https://cdn.jsdelivr.net/gh/ikottgicki-rgb/sur-games@main/games/apes-vs-helium/">
  <link rel="stylesheet" href="TemplateData/style.css">
  <script src="TemplateData/UnityProgress.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#231F20; }
    #unityContainer { width:100vw !important; height:100vh !important; }
    #avh-loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#231F20; z-index:9999;
      color:#fff; font-family:sans-serif; gap:16px;
    }
    #avh-bar-wrap { width:300px; height:12px; background:#333; border-radius:6px; overflow:hidden; }
    #avh-bar { height:100%; width:0%; background:#e05c00; border-radius:6px; transition:width 0.2s; }
  </style>
</head>
<body>
  <div id="avh-loading">
    <div id="avh-status">Downloading game data...</div>
    <div id="avh-bar-wrap"><div id="avh-bar"></div></div>
  </div>
  <div id="unityContainer"></div>
  <script>
  (async () => {
    const RAW = 'https://raw.githubusercontent.com/ikottgicki-rgb/sur-games/main/games/apes-vs-helium/';
    const status = document.getElementById('avh-status');
    const bar    = document.getElementById('avh-bar');

    async function fetchPart(url, onProgress) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + url);
      const total = parseInt(res.headers.get('content-length') || '0');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total && onProgress) onProgress(loaded / total);
      }
      return new Blob(chunks);
    }

    try {
      // Download data parts from GitHub raw (jsDelivr 403s files >20MB)
      const dataParts = ['Build/AVHPort.data.unityweb.part1', 'Build/AVHPort.data.unityweb.part2'];
      const dataBlobs = [];
      for (let i = 0; i < dataParts.length; i++) {
        status.textContent = 'Downloading data (' + (i+1) + '/' + dataParts.length + ')...';
        const blob = await fetchPart(RAW + dataParts[i], p => {
          bar.style.width = ((i + p) / dataParts.length * 80) + '%';
        });
        dataBlobs.push(blob);
      }

      // Download wasm code from GitHub raw too (also >20MB)
      status.textContent = 'Downloading wasm...';
      const wasmBlob = await fetchPart(RAW + 'Build/AVHPort.wasm.code.unityweb', p => {
        bar.style.width = (80 + p * 20) + '%';
      });

      bar.style.width = '100%';
      status.textContent = 'Preparing game...';

      const dataUrl  = URL.createObjectURL(new Blob(dataBlobs));
      const wasmUrl  = URL.createObjectURL(wasmBlob);

      // Patch the build config so UnityLoader uses our blob URLs
      const origFetch = window.fetch.bind ? window.fetch.bind(window) : window.fetch;
      window.fetch = function(resource, opts) {
        const url = typeof resource === 'string' ? resource : (resource && resource.url) || '';
        if (url.includes('AVHPort.data.unityweb'))      return origFetch(dataUrl, opts);
        if (url.includes('AVHPort.wasm.code.unityweb')) return origFetch(wasmUrl, opts);
        return origFetch(resource, opts);
      };

      // Also patch XHR for loaders that use XHR instead of fetch
      const OrigXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OrigXHR();
        const origOpen = xhr.open.bind(xhr);
        xhr.open = function(method, url) {
          if (typeof url === 'string' && url.includes('AVHPort.data.unityweb'))      url = dataUrl;
          if (typeof url === 'string' && url.includes('AVHPort.wasm.code.unityweb')) url = wasmUrl;
          return origOpen(method, url);
        };
        return xhr;
      };
      window.XMLHttpRequest.prototype = OrigXHR.prototype;

      // Load UnityLoader and start
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'Build/UnityLoader.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });

      document.getElementById('avh-loading').style.display = 'none';
      UnityLoader.instantiate('unityContainer', 'Build/AVHPort.json', {onProgress: UnityProgress});
    } catch (e) {
      status.textContent = 'Failed to load: ' + e.message;
      bar.style.background = '#c00';
    }
  })();
  </script>
</body>
</html>
