<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <script src="TemplateData/UnityProgress.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#231F20; }
    #unityContainer { width:100vw !important; height:100vh !important; }
    #avh-loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#231F20; z-index:9999;
      color:#fff; font-family:sans-serif; gap:16px;
    }
    #avh-bar-wrap { width:300px; height:12px; background:#333; border-radius:6px; overflow:hidden; }
    #avh-bar { height:100%; width:0%; background:#e05c00; border-radius:6px; transition:width 0.2s; }
  </style>
</head>
<body>
  <div id="avh-loading">
    <div id="avh-status">Downloading game data...</div>
    <div id="avh-bar-wrap"><div id="avh-bar"></div></div>
  </div>
  <div id="unityContainer"></div>
  <script>
  (async () => {
    const status = document.getElementById('avh-status');
    const bar    = document.getElementById('avh-bar');

    async function fetchPart(url, onProgress) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed: ' + url);
      const total = parseInt(res.headers.get('content-length') || '0');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total) onProgress(loaded / total);
      }
      return new Blob(chunks);
    }

    try {
      const parts = ['Build/AVHPort.data.unityweb.part1', 'Build/AVHPort.data.unityweb.part2'];
      const blobs = [];
      for (let i = 0; i < parts.length; i++) {
        status.textContent = 'Downloading data (' + (i+1) + '/' + parts.length + ')...';
        const blob = await fetchPart(parts[i], p => {
          bar.style.width = ((i + p) / parts.length * 100) + '%';
        });
        blobs.push(blob);
      }
      bar.style.width = '100%';
      status.textContent = 'Preparing game...';

      const dataObjectUrl = URL.createObjectURL(new Blob(blobs));

      // Intercept XHR so UnityLoader fetches the merged blob instead of the split file
      const origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        const args = Array.from(arguments);
        if (typeof url === 'string' && url.includes('AVHPort.data.unityweb')) {
          args[1] = dataObjectUrl;
        }
        return origOpen.apply(this, args);
      };

      // Load UnityLoader.js now that XHR is patched
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'Build/UnityLoader.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });

      document.getElementById('avh-loading').style.display = 'none';
      UnityLoader.instantiate("unityContainer", "Build/AVHPort.json", {onProgress: UnityProgress});
    } catch (e) {
      status.textContent = 'Failed to load: ' + e.message;
      bar.style.background = '#c00';
    }
  })();
  </script>
</body>
</html>
