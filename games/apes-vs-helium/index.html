<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Apes vs Helium</title>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#231F20; }
    #unityContainer { width:100vw !important; height:100vh !important; }
    #avh-loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#231F20; z-index:9999;
      color:#fff; font-family:sans-serif; gap:16px;
    }
    #avh-bar-wrap { width:300px; height:12px; background:#333; border-radius:6px; overflow:hidden; }
    #avh-bar { height:100%; width:0%; background:#e05c00; border-radius:6px; transition:width 0.2s; }
  </style>
</head>
<body>
  <div id="avh-loading">
    <div id="avh-status">Loading...</div>
    <div id="avh-bar-wrap"><div id="avh-bar"></div></div>
  </div>
  <div id="unityContainer"></div>
  <script>
  (async () => {
    const REPO      = 'ikottgicki-rgb/sur-games';
    const BASE_PATH = 'games/apes-vs-helium';
    const status    = document.getElementById('avh-status');
    const bar       = document.getElementById('avh-bar');

    // Get latest commit SHA so jsDelivr serves fresh files, not a stale cached version.
    // Same trick as gn-math uses for zones.json.
    let sha = 'main';
    try {
      const shaRes = await fetch('https://api.github.com/repos/' + REPO + '/commits?path=' + BASE_PATH + '&per_page=1&t=' + Date.now());
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        if (shaJson[0] && shaJson[0].sha) sha = shaJson[0].sha;
      }
    } catch(e) {}

    const CDN = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + sha + '/' + BASE_PATH + '/';

    async function fetchPart(url, onProgress) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + url);
      const total = parseInt(res.headers.get('content-length') || '0');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total && onProgress) onProgress(loaded / total);
      }
      return new Blob(chunks);
    }

    try {
      const dataParts = [
        'Build/AVHPort.data.unityweb.part1',
        'Build/AVHPort.data.unityweb.part2',
        'Build/AVHPort.data.unityweb.part3',
      ];
      const wasmParts = [
        'Build/AVHPort.wasm.code.unityweb.part1',
        'Build/AVHPort.wasm.code.unityweb.part2',
      ];
      const totalParts = dataParts.length + wasmParts.length;
      let partsDone = 0;

      const dataBlobs = [];
      for (let i = 0; i < dataParts.length; i++) {
        status.textContent = 'Downloading data (' + (i + 1) + '/' + dataParts.length + ')...';
        const blob = await fetchPart(CDN + dataParts[i], p => {
          bar.style.width = ((partsDone + p) / totalParts * 100) + '%';
        });
        dataBlobs.push(blob);
        partsDone++;
        bar.style.width = (partsDone / totalParts * 100) + '%';
      }

      const wasmBlobs = [];
      for (let i = 0; i < wasmParts.length; i++) {
        status.textContent = 'Downloading wasm (' + (i + 1) + '/' + wasmParts.length + ')...';
        const blob = await fetchPart(CDN + wasmParts[i], p => {
          bar.style.width = ((partsDone + p) / totalParts * 100) + '%';
        });
        wasmBlobs.push(blob);
        partsDone++;
        bar.style.width = (partsDone / totalParts * 100) + '%';
      }

      bar.style.width = '100%';
      status.textContent = 'Preparing game...';

      const dataUrl = URL.createObjectURL(new Blob(dataBlobs));
      const wasmUrl = URL.createObjectURL(new Blob(wasmBlobs));

      // Intercept fetch so Unity gets our merged blob URLs instead of the split filenames
      const origFetch = window.fetch.bind ? window.fetch.bind(window) : window.fetch;
      window.fetch = function(resource, opts) {
        const url = typeof resource === 'string' ? resource : (resource && resource.url) || '';
        if (url.includes('AVHPort.data.unityweb'))      return origFetch(dataUrl, opts);
        if (url.includes('AVHPort.wasm.code.unityweb')) return origFetch(wasmUrl, opts);
        return origFetch(resource, opts);
      };

      // Intercept XHR at instance level — proxyIIFE replaces window.XMLHttpRequest entirely
      // so patching the prototype has no effect; must wrap the already-replaced constructor
      const OrigXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OrigXHR();
        const origOpen = xhr.open.bind(xhr);
        xhr.open = function(method, url) {
          if (typeof url === 'string' && url.includes('AVHPort.data.unityweb'))      url = dataUrl;
          if (typeof url === 'string' && url.includes('AVHPort.wasm.code.unityweb')) url = wasmUrl;
          return origOpen(method, url);
        };
        return xhr;
      };
      window.XMLHttpRequest.prototype = OrigXHR.prototype;

      // Set base URL so relative paths in UnityLoader resolve against the SHA-pinned CDN
      const base = document.createElement('base');
      base.href = CDN;
      document.head.prepend(base);

      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = CDN + 'TemplateData/style.css';
      document.head.appendChild(link);

      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = CDN + 'TemplateData/UnityProgress.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });

      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = CDN + 'Build/UnityLoader.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });

      document.getElementById('avh-loading').style.display = 'none';
      UnityLoader.instantiate('unityContainer', CDN + 'Build/AVHPort.json', {onProgress: UnityProgress});
    } catch(e) {
      status.textContent = 'Failed to load: ' + e.message;
      bar.style.background = '#c00';
    }
  })();
  </script>
</body>
</html>
