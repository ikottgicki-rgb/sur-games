<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Counter-Strike 0.8</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100%; }
    #cs-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #000; z-index: 9999;
      color: #fff; font-family: sans-serif; gap: 16px;
    }
    #cs-bar-wrap { width: 300px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
    #cs-bar { height: 100%; width: 0%; background: #e05c00; border-radius: 6px; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="cs-loading">
    <div id="cs-status">Loading...</div>
    <div id="cs-bar-wrap"><div id="cs-bar"></div></div>
  </div>
  <div id="game"></div>
  <script>
  (async () => {
    const REPO      = 'ikottgicki-rgb/sur-games';
    const BASE_PATH = 'games/cs-08';
    const status    = document.getElementById('cs-status');
    const bar       = document.getElementById('cs-bar');

    let sha = 'main';
    try {
      const shaRes = await fetch('https://api.github.com/repos/' + REPO + '/commits?path=' + BASE_PATH + '&per_page=1&t=' + Date.now());
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        if (shaJson[0] && shaJson[0].sha) sha = shaJson[0].sha;
      }
    } catch(e) {}

    const CDN = 'https://cdn.jsdelivr.net/gh/' + REPO + '@' + sha + '/' + BASE_PATH + '/';

    async function fetchPart(url, onProgress) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + url);
      const total = parseInt(res.headers.get('content-length') || '0');
      const reader = res.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (total && onProgress) onProgress(loaded / total);
      }
      return new Blob(chunks);
    }

    try {
      const isoParts = ['cs.iso.part1', 'cs.iso.part2'];
      const isoBlobs = [];
      for (let i = 0; i < isoParts.length; i++) {
        status.textContent = 'Downloading game (' + (i + 1) + '/' + isoParts.length + ')...';
        const blob = await fetchPart(CDN + isoParts[i], p => {
          bar.style.width = ((i + p) / isoParts.length * 100) + '%';
        });
        isoBlobs.push(blob);
      }
      bar.style.width = '100%';
      status.textContent = 'Starting emulator...';

      const isoUrl = URL.createObjectURL(new Blob(isoBlobs));

      window.EJS_player     = '#game';
      window.EJS_core       = 'psp';
      window.EJS_gameUrl    = isoUrl;
      window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
      window.EJS_threads    = false;

      const s = document.createElement('script');
      s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
      s.onload = function() {
        document.getElementById('cs-loading').style.display = 'none';
      };
      s.onerror = function() { status.textContent = 'Failed to load emulator.'; bar.style.background = '#c00'; };
      document.head.appendChild(s);
    } catch(e) {
      status.textContent = 'Failed to load: ' + e.message;
      bar.style.background = '#c00';
    }
  })();
  </script>
</body>
</html>
